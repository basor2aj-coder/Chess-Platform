name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    needs: build-and-test
    # Only vars.* is usable here -- job-level `if:` conditions run before the
    # secrets context is available, so secrets.DEPLOY_SSH_KEY can't be checked
    # this way (GitHub rejects the whole workflow file if you try, with an
    # "Unrecognized named-value: 'secrets'" parse error). If DEPLOY_SSH_KEY is
    # unset while DEPLOY_HOST is set, this job runs anyway and fails at the
    # SSH step instead of being skipped -- an acceptable tradeoff for a guard
    # that can't reference the thing that actually matters.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write # needed to assume DEPLOY_ROLE_ARN via OIDC, no stored AWS keys
      contents: read
    steps:
      # The instance auto-stops when idle (see terraform/lambda_idle_check.tf) --
      # if a push lands while it's asleep, the SSH step below would otherwise
      # just fail with nothing to connect to. Wakes it directly via the EC2 API
      # rather than going through chess.basorelabs.dev, since DNS may still be
      # parked on the wake-up Lambda at this point.
      - name: Configure AWS credentials
        if: vars.DEPLOY_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Wake instance and wait for it to be reachable
        if: vars.DEPLOY_ROLE_ARN != '' && vars.DEPLOY_INSTANCE_ID != ''
        run: |
          aws ec2 start-instances --instance-ids "${{ vars.DEPLOY_INSTANCE_ID }}"
          aws ec2 wait instance-status-ok --instance-ids "${{ vars.DEPLOY_INSTANCE_ID }}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/table-chess
            git pull origin main
            npm ci --omit=dev
            sudo systemctl restart table-chess

      - name: Smoke test
        run: |
          sleep 5
          curl -sf "https://${{ vars.DEPLOY_HOST }}/healthz" || exit 1
