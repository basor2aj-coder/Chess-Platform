name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    needs: build-and-test
    if: >
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      vars.LIGHTSAIL_HOST != '' && secrets.LIGHTSAIL_SSH_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.LIGHTSAIL_HOST }}
          username: ${{ vars.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /opt/table-chess
            git pull origin main
            npm ci --omit=dev
            sudo systemctl restart table-chess

      - name: Smoke test
        run: |
          sleep 5
          curl -sf "https://${{ vars.LIGHTSAIL_HOST }}/healthz" || exit 1
