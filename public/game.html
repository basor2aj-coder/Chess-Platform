<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Table — Chess</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 18px 16px 40px;
  }

  .topbar {
    width: 100%;
    max-width: 620px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .plaque-btn { border: 1px solid var(--brass-dim); cursor: pointer; }
  .plaque-btn:hover { filter: brightness(1.08); }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .badge.white { color: var(--ivory); border-color: var(--ivory); }
  .badge.black { color: var(--muted); border-color: var(--muted); }

  .status-pill {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16px;
    padding: 10px 18px;
    border-radius: 999px;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text);
    text-align: center;
    width: 100%;
    max-width: 620px;
    margin-bottom: 18px;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .status-pill.your-turn { border-color: var(--brass); color: var(--brass); }
  .status-pill.check { border-color: var(--ember); color: var(--ember); }
  .status-pill.over { border-color: var(--sage); color: var(--sage); }

  .board-wrap {
    position: relative;
    width: 100%;
    max-width: 620px;
    aspect-ratio: 1 / 1;
  }
  .board-frame {
    position: absolute;
    inset: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .board {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--walnut-dark);
  }
  .sq {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(22px, 5.5vw, 40px);
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }
  .sq.light { background: var(--ivory); }
  .sq.dark { background: var(--walnut); }
  .sq.selectable { cursor: pointer; }
  .sq .piece.white { color: #fbf6ec; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.55)); }
  .sq .piece.black { color: #241d15; filter: drop-shadow(0 1px 0 rgba(255,255,255,0.15)); }

  .sq.selected::after {
    content: '';
    position: absolute; inset: 4px;
    border: 3px solid var(--brass);
    border-radius: 4px;
    pointer-events: none;
  }
  .sq.last-move { box-shadow: inset 0 0 0 999px rgba(201,162,75,0.18); }
  .sq.check-king { box-shadow: inset 0 0 0 999px rgba(180,84,58,0.35); }
  .sq .dot {
    position: absolute;
    width: 26%; height: 26%;
    border-radius: 50%;
    background: rgba(201,162,75,0.55);
    pointer-events: none;
  }
  .sq .ring {
    position: absolute;
    inset: 6%;
    border-radius: 50%;
    border: 5px solid rgba(201,162,75,0.55);
    pointer-events: none;
  }

  .coords-file, .coords-rank {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--brass-dim);
    letter-spacing: 0.05em;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(27,24,21,0.86);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 20px;
  }
  .pulse-ring {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 3px solid var(--brass);
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.9; }
    70% { transform: scale(1.5); opacity: 0; }
    100% { opacity: 0; }
  }

  .below {
    width: 100%;
    max-width: 620px;
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .modal-backdrop.show { display: flex; }
  .promo-card {
    background: var(--panel);
    border: 1px solid var(--brass-dim);
    border-radius: 12px;
    padding: 22px;
    text-align: center;
  }
  .promo-choices { display: flex; gap: 10px; margin-top: 14px; }
  .promo-choices button {
    width: 56px; height: 56px;
    font-size: 30px;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
  }
  .promo-choices button:hover { border-color: var(--brass); }

  @media (max-width: 480px) {
    .board-frame { padding: 14px; }
    .status-pill { font-size: 14px; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <button class="plaque plaque-btn" id="codePlaque" title="Tap to copy">
      <span class="plaque-label">Table</span>
      <span class="plaque-code" id="codeText">······</span>
    </button>
    <span class="badge" id="colorBadge">Connecting…</span>
  </div>

  <div class="status-pill" id="statusPill">Connecting to table…</div>

  <div class="board-wrap">
    <div class="board-frame">
      <div class="board" id="board"></div>
    </div>
    <div class="overlay" id="waitingOverlay" style="display:none;">
      <div class="pulse-ring"></div>
      <div>
        <div class="eyebrow" style="margin-bottom:6px;">Waiting for opponent</div>
        <div class="hint">Share the table code with the second player.</div>
      </div>
    </div>
  </div>

  <div class="below">
    <button class="btn-ghost" id="newGameBtn" style="display:none;">Start new game</button>
  </div>

  <div class="modal-backdrop" id="promoModal">
    <div class="promo-card">
      <div class="eyebrow">Promote pawn</div>
      <div class="promo-choices" id="promoChoices"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/game.js"></script>
</body>
</html>
